name: Publish

# Publishes @etamong-playground/i18n on a version tag (or manual dispatch):
#   1. npmjs.com  — canonical public registry (token-less OIDC trusted publishing)
#   2. GitHub Packages — mirror (org-scoped, requires @etamong-playground/ name)
#
# npmjs publish uses OIDC trusted publishing: id-token: write + the npmjs Trusted
# Publisher config lets npm exchange the GitHub OIDC token for a short-lived publish
# token with provenance auto-attached. No NPM_TOKEN secret required.
#
# workflow_dispatch with a `tag` input backfills existing tags manually.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'existing tag to (re)publish, e.g. v0.1.0'
        required: true

permissions:
  contents: read
  packages: write
  id-token: write   # required for npmjs OIDC trusted publishing (provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Ensure npm >= 11.5.1
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # ── Publish to npmjs (canonical) ──────────────────────────────────
      # Token-less OIDC trusted publishing: id-token: write + npmjs Trusted Publisher
      # config → npm exchanges the GitHub OIDC token for a short-lived publish token
      # and auto-attaches provenance. No NPM_TOKEN secret required.
      #
      # Do NOT use actions/setup-node with registry-url here: it writes a placeholder
      # NODE_AUTH_TOKEN into NPM_CONFIG_USERCONFIG which overrides OIDC and breaks auth.
      - name: Publish to npmjs (OIDC trusted publishing)
        run: |
          # Token-less OIDC: id-token: write + the npmjs Trusted Publisher. Do NOT use
          # setup-node registry-url here — it writes a placeholder NODE_AUTH_TOKEN that
          # overrides OIDC. Clear any stray npmrc so npm uses OIDC against the default
          # registry (registry.npmjs.org).
          rm -f .npmrc
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
          npm publish --access public

      # ── Publish to GitHub Packages (mirror) ───────────────────────────
      - name: Publish to GitHub Packages
        run: |
          printf '//npm.pkg.github.com/:_authToken=%s\n' "$GITHUB_TOKEN" > .npmrc
          npm publish --access public --registry https://npm.pkg.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
