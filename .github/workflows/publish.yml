name: Publish

# Publishes @etamong-playground/i18n on a version tag (or manual dispatch):
#   1. npmjs.com  — canonical public registry
#   2. GitHub Packages — mirror (org-scoped, requires @etamong-playground/ name)
#
# npmjs publish is bootstrapped with NPM_TOKEN (repo secret) until a Trusted
# Publisher is configured on npmjs.com; once set, remove NPM_TOKEN and npm
# publishes token-less with OIDC provenance auto-attached.
#
# workflow_dispatch with a `tag` input backfills existing tags manually.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'existing tag to (re)publish, e.g. v0.1.0'
        required: true

permissions:
  contents: read
  packages: write
  id-token: write   # required for future npmjs Trusted Publisher (OIDC provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Ensure npm >= 11.5.1
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # ── Publish to npmjs (canonical) ──────────────────────────────────
      # NODE_AUTH_TOKEN is bootstrap-only. Once a Trusted Publisher is set on
      # npmjs.com for etamong-playground/i18n, remove NPM_TOKEN and this env
      # line — npm will publish token-less with OIDC provenance auto-attached.
      - name: Publish to npmjs
        run: |
          # Bootstrap auth via explicit .npmrc. After a Trusted Publisher is configured on
          # npmjs, this step moves to setup-node registry-url + id-token OIDC (no token).
          printf '@etamong-playground:registry=https://registry.npmjs.org\n//registry.npmjs.org/:_authToken=%s\n' "$NODE_AUTH_TOKEN" > .npmrc
          npm publish --access public --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Publish to GitHub Packages (mirror) ───────────────────────────
      - name: Publish to GitHub Packages
        run: |
          printf '//npm.pkg.github.com/:_authToken=%s\n' "$GITHUB_TOKEN" > .npmrc
          npm publish --access public --registry https://npm.pkg.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
