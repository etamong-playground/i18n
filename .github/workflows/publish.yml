name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

# Forgejo token fetched from Vault at runtime (role: npm-publish on auth/jwt/github).
# No GitHub org/repo secrets used.

jobs:
  publish:
    runs-on: arc-etamong-playground
    permissions:
      contents: read
      packages: write
      id-token: write   # needed for Vault JWT auth

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      # ── Fetch Forgejo npm token from Vault ─────────────────────────
      - uses: hashicorp/vault-action@v3
        with:
          url: http://vault.vault.svc:8200
          method: jwt
          path: github
          role: npm-publish
          jwtGithubAudience: https://vault.m.etamong.com
          secrets: |
            homelab/apps/forgejo/npm-publish token | FORGEJO_NPM_TOKEN

      - name: Publish to GitHub Packages
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = pkg.name.replace('@etamong-lab/', '@etamong-playground/');
            delete pkg.publishConfig;
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Forgejo Packages
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = pkg.name.replace('@etamong-lab/', '@etamong-playground/');
            delete pkg.publishConfig;
            pkg.publishConfig = { registry: 'https://git.m.etamong.com/api/packages/etamong-playground/npm/' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          FORGEJO_REGISTRY="https://git.m.etamong.com/api/packages/etamong-playground/npm/"
          echo "//git.m.etamong.com/api/packages/etamong-playground/npm/:_authToken=${FORGEJO_NPM_TOKEN}" > .npmrc
          npm publish --registry "$FORGEJO_REGISTRY"
        env:
          FORGEJO_NPM_TOKEN: ${{ env.FORGEJO_NPM_TOKEN }}
