name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to GitHub Packages
        run: |
          # Rewrite scope for @etamong-playground
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = pkg.name.replace('@etamong-lab/', '@etamong-playground/');
            delete pkg.publishConfig;
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Forgejo Packages
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = pkg.name.replace('@etamong-playground/', '@etamong-playground/');
            pkg.publishConfig = { registry: 'https://git.m.etamong.com/api/packages/etamong-playground/npm/' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          FORGEJO_REGISTRY="https://git.m.etamong.com/api/packages/etamong-playground/npm/"
          echo "//git.m.etamong.com/api/packages/etamong-playground/npm/:_authToken=${{ secrets.FORGEJO_NPM_TOKEN }}" > .npmrc
          npm publish --registry "$FORGEJO_REGISTRY"
        env:
          FORGEJO_NPM_TOKEN: ${{ secrets.FORGEJO_NPM_TOKEN }}
